### model
model_name_or_path: /extra/caochunhong/gm/pcb_multi_agent/models/Qwen2.5-VL-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all
quantization_bit: 4
upcast_layernorm: true

### dataset
dataset: pcb_smoke
dataset_dir: /extra/caochunhong/gm/pcb_multi_agent/LLaMA-Factory/data
template: qwen2_vl
cutoff_len: 1024
max_samples: 20
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: /extra/caochunhong/gm/pcb_multi_agent/output/qwen25vl_7b_pcb_smoke
logging_steps: 1
save_steps: 20
plot_loss: true
overwrite_output_dir: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
fp16: true
bf16: false
gradient_checkpointing: true
